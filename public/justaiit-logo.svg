<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" width="100%" height="100%">
  <defs>
    <!-- Frame Gradient (violet to cyan, identical to app branding) -->
    <linearGradient id="frame-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8C50F0" />
      <stop offset="50%" stop-color="#1F7AFF" />
      <stop offset="100%" stop-color="#3CDCF0" />
    </linearGradient>

    <!-- Sparkle Gradient (vibrant purple/pink/magenta) -->
    <linearGradient id="sparkle-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8C50F0" />
      <stop offset="100%" stop-color="#D946EF" />
    </linearGradient>

    <!-- Styling for Text to look identical to logo -->
    <style>
      .logo-text {
        font-family: 'Space Grotesk', 'Heebo', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 900;
        fill: #000000;
      }
    </style>
  </defs>

  <!-- Group centered vertically around Y = 48 -->
  <g>
    <!-- "JUST" Text -->
    <text x="144" y="48" class="logo-text" font-size="28" text-anchor="end" dominant-baseline="central" letter-spacing="-0.5">JUST</text>

    <!-- Rounded Rectangle Box with top-right gap -->
    <!-- Center: (182, 48) -->
    <!-- Box width: 50, height: 50. X ranges 157 to 207. Y ranges 23 to 73 -->
    <!-- Corner radius: 9 -->
    <!-- Stroke width: 3.5 -->
    <!-- Top right corner center line is at (207, 23) -->
    <path 
      d="M 193,23 L 166,23 A 9,9 0 0 0 157,32 L 157,64 A 9,9 0 0 0 166,73 L 198,73 A 9,9 0 0 0 207,64 L 207,37" 
      fill="none" 
      stroke="url(#frame-grad)" 
      stroke-width="3.5" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
    />

    <!-- Sparkle shape at top-right corner -->
    <!-- Path centered at (207, 23) with radius 14 -->
    <path 
      d="M 207,9 Q 207,23 221,23 Q 207,23 207,37 Q 207,23 193,23 Q 207,23 207,9 Z" 
      fill="url(#sparkle-grad)" 
    />

    <!-- "AI" inside the box -->
    <!-- Centered at X = 182, Y = 48 -->
    <text x="182" y="48" class="logo-text" font-size="22" text-anchor="middle" dominant-baseline="central" letter-spacing="-0.5">AI</text>

    <!-- "IT" Text -->
    <!-- Starts at X = 220 -->
    <text x="220" y="48" class="logo-text" font-size="28" text-anchor="start" dominant-baseline="central" letter-spacing="-0.5">IT</text>
  </g>
</svg>
